<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZIPNCRYPT_MOBILE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #0f0; padding: 25px; background: #050505; width: 90%; max-width: 400px; box-shadow: 0 0 20px #040; }
        h2 { text-align: center; letter-spacing: 3px; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .input-group { margin: 20px 0; }
        label { display: block; font-size: 12px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 100%; padding: 12px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; margin-top: 10px; font-weight: bold; cursor: pointer; border: 1px solid #0f0; background: transparent; color: #0f0; text-transform: uppercase; }
        button:hover { background: #0f0; color: #000; }
        #status { margin-top: 20px; font-size: 12px; text-align: center; color: #0f0; min-height: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>ZIPNCRYPT</h2>
    
    <div class="input-group">
        <label>TARGET_FILE</label>
        <input type="file" id="fileIn">
    </div>

    <div class="input-group">
        <label>ACCESS_KEY</label>
        <input type="password" id="passKey" placeholder="********">
    </div>

    <button onclick="process('LOCK')">ENCRYPT_DATA</button>
    <button onclick="process('UNLOCK')" style="opacity: 0.7; font-size: 10px;">DECRYPT_DATA</button>
    
    <div id="status">IDLE_</div>
</div>

<script>
    async function process(mode) {
        const fileInput = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const log = document.getElementById('status');

        if (!fileInput.files[0] || !pass) {
            log.innerText = "ERROR: DATA_MISSING";
            return;
        }

        const file = fileInput.files[0];
        log.innerText = "PROCESSING_LARGE_FILE...";

        // Use FileReader for better iPad compatibility
        const reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const key = new TextEncoder().encode(pass);

                // XOR transformation
                for (let i = 0; i < data.length; i++) {
                    data[i] ^= key[i % key.length];
                }

                const blob = new Blob([data], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = (mode === 'LOCK' ? "LOCKED_" : "OPEN_") + file.name;
                
                // On iPad, we need to add the link to the document for it to work
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    log.innerText = "SUCCESS: DATA_SAVED";
                }, 500);

            } catch (err) {
                log.innerText = "SYSTEM_MEMORY_OVERLOAD";
            }
        };

        reader.onerror = () => { log.innerText = "READ_ERROR"; };
        
        // This starts the reading process
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
