<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZIPNCRYPT_TERMINAL</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid #00ff41; padding: 30px; background: #050505; box-shadow: 0 0 30px #004400; width: 450px; }
        h2 { text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; font-size: 1.5rem; letter-spacing: 4px; text-shadow: 0 0 8px #0f0; }
        .field { margin: 20px 0; }
        label { display: block; font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; font-family: 'Courier New'; font-weight: bold; cursor: pointer; border: 1px solid #00ff41; transition: 0.2s; background: transparent; color: #00ff41; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        #status-log { margin-top: 25px; font-size: 11px; padding: 10px; border: 1px solid #004400; background: #080808; min-height: 40px; line-height: 1.4; }
        .glitch { animation: blink 1s infinite; color: #fff; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <h2>ZIPNCRYPT</h2>
    
    <div class="field">
        <label>FILE_TO_PROCESS</label>
        <input type="file" id="fileIn">
    </div>

    <div class="field">
        <label>PASSCODE_KEY</label>
        <input type="password" id="passKey" placeholder="********">
    </div>

    <div class="controls">
        <button onclick="executeVault('LOCK')">ENCRYPT</button>
        <button onclick="executeVault('UNLOCK')">DECRYPT</button>
    </div>
    
    <div id="status-log">SYSTEM_READY...</div>
</div>

<script>
    async function executeVault(mode) {
        const fileInput = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const log = document.getElementById('status-log');

        if (!fileInput.files[0] || !pass) {
            log.innerHTML = "<span style='color:red'>!! ERROR: DATA_INPUT_REQUIRED</span>";
            return;
        }

        const file = fileInput.files[0];
        const newName = (mode === 'LOCK' ? "LOCKED_" : "OPEN_") + file.name;

        try {
            // Check for API support
            if (!window.showSaveFilePicker) {
                throw new Error("BROWSER_UNSUPPORTED: USE_CHROME_OR_EDGE");
            }

            const handle = await window.showSaveFilePicker({ suggestedName: newName });
            const writable = await handle.createWritable();
            
            log.innerHTML = "STATUS: <span class='glitch'>STREAMING_BITS...</span>";

            const key = new TextEncoder().encode(pass);
            let offset = 0;
            const reader = file.stream().getReader();

            // Processing in small chunks (64KB) to avoid Memory Pressure
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = new Uint8Array(value);
                for (let i = 0; i < chunk.length; i++) {
                    chunk[i] ^= key[(offset + i) % key.length];
                }
                offset += chunk.length;

                // Write and force flush to disk to clear RAM
                await writable.write(chunk);
                
                const progress = Math.round((offset / file.size) * 100);
                log.innerText = `>> CRYPTING: ${progress}% COMPLETE`;
            }

            await writable.close();
            log.innerHTML = "STATUS: <span style='color:#00ff41'>SUCCESS_FILE_SAVED</span>";

        } catch (err) {
            console.error(err);
            if (err.name === 'AbortError') {
                log.innerText = ">> USER_ABORTED";
            } else {
                log.innerHTML = `<span style='color:red'>!! FAIL: ${err.message}</span>`;
            }
        }
    }
</script>

</body>
</html>
