<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_VAULT_v3</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #00ff41; padding: 30px; background: #050505; box-shadow: 0 0 20px #004400; width: 380px; }
        h2 { text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px; font-size: 1.2rem; }
        .field { margin: 20px 0; }
        label { display: block; font-size: 10px; margin-bottom: 5px; opacity: 0.8; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 10px; box-sizing: border-box; outline: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-family: 'Courier New'; font-weight: bold; cursor: pointer; border: 1px solid #00ff41; transition: 0.3s; }
        .btn-main { background: #00ff41; color: #000; }
        .btn-sub { background: transparent; color: #00ff41; }
        button:hover { box-shadow: 0 0 10px #00ff41; }
        #status-log { margin-top: 20px; font-size: 11px; border-top: 1px dashed #004400; padding-top: 10px; color: #00ff41; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>> CRYPT_OS_LOADED</h2>
    
    <div class="field">
        <label>SELECT_TARGET_DATA</label>
        <input type="file" id="fileIn">
    </div>

    <div class="field">
        <label>ACCESS_KEY_REQUIRED</label>
        <input type="password" id="passKey" placeholder="********">
    </div>

    <div class="controls">
        <button class="btn-main" onclick="execute('LOCK')">LOCK</button>
        <button class="btn-sub" onclick="execute('UNLOCK')">UNLOCK</button>
    </div>
    
    <div id="status-log">SYSTEM_READY...</div>
</div>

<script>
    async function execute(mode) {
        const fileInput = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const log = document.getElementById('status-log');

        if (!fileInput.files[0] || !pass) {
            log.innerText = "!! ERROR: INPUT_REQUIRED";
            return;
        }

        log.innerText = ">> INITIALIZING_BIT_FLIP...";

        try {
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const key = new TextEncoder().encode(pass);

                    // XOR Engine
                    for (let i = 0; i < data.length; i++) {
                        data[i] ^= key[i % key.length];
                    }

                    const blob = new Blob([data], { type: "application/octet-stream" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = (mode === 'LOCK' ? "LOCKED_" : "OPEN_") + file.name;
                    a.click();
                    
                    URL.revokeObjectURL(url);
                    log.innerText = ">> SUCCESS: OPERATION_COMPLETE";
                } catch (innerErr) {
                    log.innerText = "!! ERROR: BUFFER_OVERFLOW";
                }
            };

            reader.readAsArrayBuffer(file);

        } catch (err) {
            log.innerText = "!! ERROR: CRITICAL_SYSTEM_FAILURE";
        }
    }
</script>

</body>
</html>
