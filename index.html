<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIPNCRYPT_V10</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid #0f0; padding: 30px; background: #050505; width: 90%; max-width: 400px; box-shadow: 0 0 25px #040; text-align: center; }
        h2 { letter-spacing: 5px; border-bottom: 2px solid #0f0; padding-bottom: 10px; margin-bottom: 25px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-weight: bold; cursor: pointer; border: 1px solid #0f0; background: #0f0; color: #000; text-transform: uppercase; }
        .btn-alt { background: transparent; color: #0f0; }
        #status { margin-top: 20px; font-size: 11px; color: #0f0; opacity: 0.7; }
    </style>
</head>
<body>
<div class="terminal">
    <h2>ZIPNCRYPT</h2>
    <input type="file" id="fileIn">
    <input type="password" id="passKey" placeholder="CIPHER_KEY">
    <div class="controls">
        <button onclick="startVault('LOCK')">SECURE</button>
        <button class="btn-alt" onclick="startVault('UNLOCK')">UNLOCK</button>
    </div>
    <div id="status">SYSTEM_STABLE_V10</div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    async function startVault(mode) {
        const fileIn = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const status = document.getElementById('status');

        if (!fileIn.files[0] || !pass) { status.innerText = "!! REQUIRED: FILE + KEY"; return; }

        const file = fileIn.files[0];
        // Clean up the filename so we don't get "LOCKED_OPEN_LOCKED_..."
        let fileName = file.name.replace("LOCKED_", "").replace("OPEN_", "");
        fileName = (mode === 'LOCK' ? "LOCKED_" : "OPEN_") + fileName;

        if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
                type: 'START_STREAM',
                file: file,
                pass: pass
            });

            setTimeout(() => {
                const a = document.createElement('a');
                a.href = `./download-stream/${Date.now()}`;
                a.download = fileName;
                a.click();
                status.innerText = "TRANSMISSION_COMPLETE";
            }, 100); 
        } else {
            location.reload();
        }
    }
</script>
</body>
</html>
