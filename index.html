<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_VAULT_v5_DIRECT_IO</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid #00ff41; padding: 30px; background: #050505; box-shadow: 0 0 30px #002200; width: 450px; }
        h2 { text-align: center; border-bottom: 2px solid #00ff41; padding-bottom: 10px; font-size: 1.1rem; text-shadow: 0 0 5px #0f0; }
        .field { margin: 20px 0; }
        label { display: block; font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; width: 100%; padding: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; font-family: 'Courier New'; font-weight: bold; cursor: pointer; border: 1px solid #00ff41; transition: 0.2s; background: transparent; color: #00ff41; }
        button:hover { background: #00ff41; color: #000; box-shadow: 0 0 20px #00ff41; }
        #status-log { margin-top: 25px; font-size: 11px; padding: 10px; border: 1px solid #004400; background: #080808; white-space: pre-wrap; }
        .warning { color: #ff0; font-size: 9px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>[ HEAVY_DATA_PROCESSOR ]</h2>
    
    <div class="field">
        <label>TARGET_DATA_STREAM</label>
        <input type="file" id="fileIn">
    </div>

    <div class="field">
        <label>CIPHER_KEY</label>
        <input type="password" id="passKey" placeholder="********">
    </div>

    <div class="controls">
        <button onclick="processDirect('LOCK')">LOCK_FILE</button>
        <button onclick="processDirect('UNLOCK')">UNLOCK_FILE</button>
    </div>
    
    <div id="status-log">SYSTEM_IDLE...</div>
    <div class="warning">NOTICE: A SYSTEM DIALOG WILL APPEAR TO SAVE THE NEW FILE.</div>
</div>

<script>
    async function processDirect(mode) {
        const fileInput = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const log = document.getElementById('status-log');

        if (!fileInput.files[0] || !pass) {
            log.innerText = "!! ERROR: MISSING_INPUTS";
            return;
        }

        const file = fileInput.files[0];
        const newName = (mode === 'LOCK' ? "LOCKED_" : "OPEN_") + file.name;

        try {
            // 1. Request permission to save a file directly to disk
            // This is what prevents the browser from crashing/freezing
            const handle = await window.showSaveFilePicker({
                suggestedName: newName,
            });
            
            const writable = await handle.createWritable();
            log.innerText = ">> DIRECT_IO_CONNECTED\n>> PROCESSING_CHUNKS...";

            const key = new TextEncoder().encode(pass);
            let offset = 0;
            const reader = file.stream().getReader();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const data = new Uint8Array(value);
                // XOR transformation on the chunk
                for (let i = 0; i < data.length; i++) {
                    data[i] ^= key[(offset + i) % key.length];
                }
                offset += data.length;

                // Write the chunk IMMEDIATELY to the hard drive
                await writable.write(data);
                
                const progress = Math.round((offset / file.size) * 100);
                log.innerText = `>> PROGRESS: ${progress}%`;
            }

            await writable.close();
            log.innerText = ">> SUCCESS: FILE_WRITTEN_TO_DISK";

        } catch (err) {
            console.error(err);
            if (err.name === 'AbortError') {
                log.innerText = ">> USER_CANCELLED";
            } else {
                log.innerText = "!! CRITICAL_ERROR: SYSTEM_MEMORY_PRESSURE";
            }
        }
    }
</script>

</body>
</html>
