<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL_VAULT_v1.0</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }
        .vault-box {
            border: 2px solid #0f0;
            padding: 30px;
            box-shadow: 0 0 15px #0f0;
            background: #050505;
            width: 400px;
        }
        h2 { border-bottom: 1px solid #0f0; padding-bottom: 10px; text-align: center; }
        .input-group { margin: 20px 0; }
        input {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #00ff41; box-shadow: 0 0 10px #0f0; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #0f0; text-align: center; }
    </style>
</head>
<body>

<div class="vault-box">
    <h2>Access Terminal</h2>
    
    <div class="input-group">
        <label>Select Target File</label>
        <input type="file" id="fileInput">
    </div>

    <div class="input-group">
        <label>Encryption Key</label>
        <input type="password" id="passcode" placeholder="ENTER_CODE_">
    </div>

    <button id="lockBtn">SECURE FILE</button>
    <button id="unlockBtn" style="background: transparent; color: #0f0; border: 1px solid #0f0;">DECRYPT FILE</button>
    
    <div id="status">READY_</div>
</div>

<script>
    const status = document.getElementById('status');

    async function processFile(mode) {
        const fileInput = document.getElementById('fileInput');
        const passcode = document.getElementById('passcode').value;

        if (!fileInput.files[0] || !passcode) {
            status.innerText = "ERROR: CREDENTIALS_MISSING";
            return;
        }

        status.innerText = "EXECUTING...";

        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            
            /* LOGIC NOTE: To make this "unlockable," we use the passcode 
               to transform the data. If you use the same passcode twice, 
               it flips the bits back to their original state.
            */
            const data = new Uint8Array(arrayBuffer);
            const key = new TextEncoder().encode(passcode);
            
            for (let i = 0; i < data.length; i++) {
                data[i] = data[i] ^ key[i % key.length]; // XOR transformation
            }

            const blob = new Blob([data], { type: "application/octet-stream" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = mode === 'lock' ? `LOCKED_${file.name}` : `OPEN_${file.name.replace('LOCKED_', '')}`;
            a.click();
            
            window.URL.revokeObjectURL(url);
            status.innerText = "COMMAND_SUCCESSFUL";
        } catch (e) {
            status.innerText = "SYSTEM_FAILURE";
        }
    }

    document.getElementById('lockBtn').addEventListener('click', () => processFile('lock'));
    document.getElementById('unlockBtn').addEventListener('click', () => processFile('unlock'));
</script>

</body>
</html>
