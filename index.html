<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZIPNCRYPT_V8_STREAM</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { border: 2px solid #0f0; padding: 30px; background: #050505; width: 380px; box-shadow: 0 0 20px #040; text-align: center; }
        h2 { letter-spacing: 5px; border-bottom: 2px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 100%; padding: 12px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border: 1px solid #0f0; background: #0f0; color: #000; text-transform: uppercase; }
        #status { font-size: 11px; color: #0f0; margin-top: 15px; min-height: 30px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>ZIPNCRYPT</h2>
    <input type="file" id="fileIn">
    <input type="password" id="passKey" placeholder="CIPHER_KEY">
    <button onclick="startVault()">GENERATE_SECURE_LINK</button>
    <div id="status">READY_TO_STREAM...</div>
</div>

<script>
    // Register the "mini-server" (Service Worker)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    async function startVault() {
        const fileIn = document.getElementById('fileIn');
        const pass = document.getElementById('passKey').value;
        const status = document.getElementById('status');

        if (!fileIn.files[0] || !pass) {
            status.innerText = "!! ERROR: DATA_REQUIRED";
            return;
        }

        const file = fileIn.files[0];
        status.innerText = "INITIALIZING_STREAMING_LINK...";

        // We create a unique "Link" for this specific file
        const fileName = "LOCKED_" + file.name;
        const streamUrl = btoa(fileName); // Encoded link

        // Send the file and password info to the Service Worker
        const channel = new MessageChannel();
        navigator.serviceWorker.controller.postMessage({
            type: 'START_STREAM',
            file: file,
            pass: pass,
            fileName: fileName
        }, [channel.port2]);

        // Open the "Link" to trigger the download
        // The Service Worker will intercept this and start the stream
        const downloadLink = document.createElement('a');
        downloadLink.href = `./download-stream/${streamUrl}`;
        downloadLink.download = fileName;
        downloadLink.click();

        status.innerText = "LINK_ACTIVE: CHECK_DOWNLOADS_FOLDER";
    }
</script>
</body>
</html>
